{% extends 'base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
<section class="min-h-[60vh] flex items-center justify-center py-12">
    <div class="max-w-md w-full mx-4">
        <div class="bg-white rounded-xl shadow-md p-8">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-900">Connexion</h1>
                <p class="text-gray-600 mt-2">Accédez à votre espace administrateur</p>
            </div>
            
            <form method="post" action="{% url 'users:login' %}">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next|default:'/' }}">
                
                <div class="space-y-4">
                    <div>
                        <label for="id_username" class="block text-sm font-medium text-gray-700 mb-2">Nom d'utilisateur</label>
                        <input type="text" name="username" id="id_username" required
                               class="input-field"
                               placeholder="Votre nom d'utilisateur">
                    </div>
                    
                    <div>
                        <label for="id_password" class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
                        <input type="password" name="password" id="id_password" required
                               class="input-field"
                               placeholder="Votre mot de passe">
                    </div>
                </div>
                
                <button type="submit" class="btn-primary w-full mt-6">
                    <i class="fas fa-sign-in-alt mr-2"></i>
                    Se connecter
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <a href="{% url 'core:home' %}" class="text-gray-600 hover:text-red-600 transition">
                    <i class="fas fa-arrow-left mr-1"></i> Retour à l'accueil
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
